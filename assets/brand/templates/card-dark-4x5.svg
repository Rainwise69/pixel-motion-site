<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- TEMPLATE · Cartão tipográfico ESCURO 4:5 (post de marca/voz)
       Editar: eyebrow (linha CATEGORIA), as 3 linhas do título (1 palavra em gradiente via fill do tspan), sub e rodapé. -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E6BFF"/><stop offset=".38" stop-color="#FF7A2F"/>
      <stop offset=".64" stop-color="#F5232E"/><stop offset="1" stop-color="#8B2FBF"/>
    </linearGradient>
    <radialGradient id="gelA" cx="18%" cy="8%" r="60%">
      <stop offset="0" stop-color="#2E6BFF" stop-opacity=".16"/><stop offset="1" stop-color="#2E6BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gelB" cx="88%" cy="95%" r="55%">
      <stop offset="0" stop-color="#8B2FBF" stop-opacity=".14"/><stop offset="1" stop-color="#8B2FBF" stop-opacity="0"/>
    </radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@900&amp;family=Schibsted+Grotesk:wght@400;500&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .mono { font-family:'JetBrains Mono',monospace; letter-spacing:.16em; }
      .title { font-family:'Archivo',sans-serif; font-weight:900; letter-spacing:-.01em; }
      .body { font-family:'Schibsted Grotesk',sans-serif; }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="#0B0B0E"/>
  <rect width="1080" height="1350" fill="url(#gelA)"/>
  <rect width="1080" height="1350" fill="url(#gelB)"/>

  <!-- eyebrow -->
  <rect x="96" y="150" width="44" height="4" rx="2" fill="url(#grad)"/>
  <text x="158" y="159" class="mono" font-size="22" fill="#A8A6B3">CATEGORIA — LABEL</text>

  <!-- título: 1 palavra em gradiente -->
  <text x="96" y="560" class="title" font-size="112" fill="#F2F1EE">Primeira linha</text>
  <text x="96" y="680" class="title" font-size="112" fill="#F2F1EE">com <tspan fill="url(#grad)">destaque</tspan></text>
  <text x="96" y="800" class="title" font-size="112" fill="#F2F1EE">na palavra.</text>

  <!-- sub -->
  <text x="96" y="900" class="body" font-size="34" fill="#A8A6B3">Uma linha de apoio curta, direta,</text>
  <text x="96" y="946" class="body" font-size="34" fill="#A8A6B3">sem enchimento.</text>

  <!-- rodapé -->
  <text x="96" y="1236" class="mono" font-size="20" fill="#A8A6B3">PIXEL MOTION · COIMBRA</text>
  <text x="984" y="1244" class="title" font-size="44" text-anchor="end" fill="url(#grad)">PM</text>
</svg>
