<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- TEMPLATE · Cartão tipográfico CLARO 4:5 — o "respiro" (Fork 2B).
       Regras: máx. 1 claro por 5-6 posts; nunca 2 claros adjacentes; sempre tipográfico. -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E6BFF"/><stop offset=".38" stop-color="#FF7A2F"/>
      <stop offset=".64" stop-color="#F5232E"/><stop offset="1" stop-color="#8B2FBF"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@900&amp;family=Schibsted+Grotesk:wght@400;500&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .mono { font-family:'JetBrains Mono',monospace; letter-spacing:.16em; }
      .title { font-family:'Archivo',sans-serif; font-weight:900; letter-spacing:-.01em; }
      .body { font-family:'Schibsted Grotesk',sans-serif; }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="#F2F1EE"/>

  <!-- eyebrow -->
  <rect x="96" y="150" width="44" height="4" rx="2" fill="url(#grad)"/>
  <text x="158" y="159" class="mono" font-size="22" fill="#5F5C6A">CATEGORIA — LABEL</text>

  <!-- título escuro -->
  <text x="96" y="560" class="title" font-size="112" fill="#0B0B0E">Frase curta,</text>
  <text x="96" y="680" class="title" font-size="112" fill="#0B0B0E">humana, real.</text>

  <!-- linha de acento -->
  <rect x="96" y="740" width="360" height="6" rx="3" fill="url(#grad)"/>

  <!-- sub -->
  <text x="96" y="850" class="body" font-size="34" fill="#5F5C6A">Uma linha de apoio. Uma só.</text>

  <!-- rodapé -->
  <text x="96" y="1236" class="mono" font-size="20" fill="#5F5C6A">PIXEL MOTION · COIMBRA</text>
  <text x="984" y="1244" class="title" font-size="44" text-anchor="end" fill="url(#grad)">PM</text>
</svg>
